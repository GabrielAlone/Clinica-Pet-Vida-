<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pet Vida - Tela Principal</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('fundo.jpg') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
     background-image: url('image.png'); 
}


.container {
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    width: 400px;
    text-align: center;
}


.container img {
    width: 120px;
    height: 120px;
    margin-bottom: 20px;
}


h2 {
    color: #2c7be5;
    margin-bottom: 30px;
}


button {
    width: 80%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    background-color: #2c7be5;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.3s;
}


button:hover {
    background-color: #1a5fc4;
}



button.secondary {
    background-color: #00FA9A;
}


button.secondary:hover {
    background-color: #00c985;
}
</style>
</head>
<body>


<div class="container">
    <img src="unnamed.webp" alt="Pet Vida">
    <h2>Bem-vindo ao Pet Vida</h2>


    <button onclick="window.location.href='loguin.html'">Login</button>
    <button class="secondary" onclick="window.location.href='cadastro.html'">Cadastro</button>
    <button onclick="window.location.href='config.html'">acessar sem login</button>
</div>


</body>
</html>
