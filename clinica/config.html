<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Configurações do Usuário</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
             background-image: url('image.png'); 
        }

        .actions {
            margin-bottom: 20px;
            width: 450px;
        }

        .config-box {
            background: white;
            padding: 30px;
            width: 450px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
            display: block;
            margin: 0 auto 10px auto;
            object-fit: cover;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1a5fc4;
        }

        .btn-home {
            background: #6c757d;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="actions">
        <button class="btn-home" onclick="irConfig()">⬅ Voltar para Loja</button>
    </div>

    <div class="config-box">
        <h2>Configurações</h2>
        <img id="preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        
        <input type="file" onchange="trocarFoto(event)" accept="image/*">

        <label>Nome</label>
        <input type="text" id="nome" value="Usuário">

        <label>Email</label>
        <input type="email" value="usuario@email.com" readonly style="background: #eee;">

        <label>Nova senha</label>
        <input type="password" placeholder="Digite nova senha">

        <label>Confirmar senha</label>
        <input type="password" placeholder="Confirme a senha">

        <button onclick="salvar()">Salvar alterações</button>
    </div>

    <script>
        function trocarFoto(event) {
            const file = event.target.files[0];
            if (file) {
                const img = document.getElementById("preview");
                img.src = URL.createObjectURL(file);
            }
        }

        function salvar() {
            const nome = document.getElementById("nome").value;
            localStorage.setItem('user-name', nome); // Exemplo de como salvar algo
            alert("Configurações salvas com sucesso!");
        }

        function irConfig() {
            // Certifique-se que o arquivo de destino é index.html
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
