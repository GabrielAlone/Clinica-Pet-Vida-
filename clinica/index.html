<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PetCare Clínica Veterinária • e-Commerce</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
        :root{--brand:#0059ff;--accent:#00c3ff;--accent-dark:rgb(255, 255, 255);--bg:#f2f6f9;--card:#ffffff;--text:#222;--muted:#666;--blue:#3498db;--blue-dark:#2c80b4}
        body{background:var(--bg);color:var(--text)}
       
        header{background:var(--brand);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
        .brand{font-size:22px;font-weight:700}
       
       
        .search-container {flex-grow: 1; max-width: 400px; position: relative;}
        .search-container input {
            width: 100%; padding: 10px 15px; border-radius: 20px; border: none; outline: none;
        }


        .actions{display:flex;align-items:center;gap:10px}
        .cart-indicator{background:#fff;color:var(--brand);border-radius:999px;padding:6px 12px;font-weight:700}
       
        .container{display:flex;padding:24px;gap:24px;align-items:flex-start}
        .produtos{flex:3;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
        .produto{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.08);transition:0.3s}
        .produto:hover{transform:translateY(-4px)}
        .produto.hidden { display: none; }
       
        .produto img{width:100%;height:180px;object-fit:cover}
        .produto-info{padding:14px;text-align:center;display:flex;flex-direction:column;gap:8px}
        .produto-info h3{font-size:16px}
        .preco{color:var(--accent);font-size:18px;font-weight:700}
       
        button{background:var(--accent);color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;transition:0.2s}
        button:hover{background:var(--accent-dark)}
        .btn-blue{background:var(--blue)}
        .btn-blue:hover{background:var(--blue-dark)}
       
        .carrinho{flex:1;background:var(--card);padding:18px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.08);position:sticky;top:24px}
        .item{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #eee}
        .qty{display:flex;align-items:center;gap:6px}
        .remove{background:#e74c3c}
        .total{margin-top:12px;font-size:18px;font-weight:700}
        .checkout-form{margin-top:12px;display:none; border-top: 1px solid #eee; padding-top: 15px;}
        .field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
        .field label{font-size:13px;color:var(--muted)}
        .field input, .field select, .field textarea{padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
        .success{margin-top:10px;background:#2ecc71;color:#fff;padding:10px;border-radius:8px;display:none}
       
        @media (max-width:900px){
            .container{flex-direction:column}
            .carrinho{position:static; width: 100%;}
            .search-container { order: 3; max-width: 100%; width: 100%; }
        }
       
    </style>
</head>
<body>


<header>
    <div class="brand"> PetCare</div>
   
    <div class="search-container">
        <input type="text" id="input-busca" placeholder="O que seu pet precisa hoje?">
    </div>


    <div class="actions">
        <button class="btn-blue" onclick="irConfig()">⚙️ Configurações</button>
        <div class="cart-indicator">🛒 <span id="cart-count">0</span></div>
    </div>
</header>

    <div class="carrinho">
        <h2>🛒 Carrinho</h2>
        <div id="itens"></div>
        <div class="total">Total: <span id="total">R$ 0,00</span></div>
        <button class="checkout btn-blue" id="btn-checkout" style="width: 100%; margin-top: 10px;">Finalizar Compra</button>
       
        <form class="checkout-form" id="form-checkout">
            <div class="field"><label>Nome</label><input type="text" id="nome" required></div>
            <div class="field"><label>Pagamento</label>
                <select id="pagamento" required>
                    <option value="">Selecione</option>
                    <option value="pix">Pix</option>
                    <option value="cartao">Cartão</option>
                </select>
            </div>
            <button type="submit" class="btn-blue" style="width: 100%;">Confirmar Pedido</button>
            <div class="success" id="sucesso">Pedido confirmado! 🐶</div>
        </form>
    </div>
</div>


<script>
 
    const state = { cart: [] };

    
    const el = {
        busca: document.getElementById('input-busca'),
        listaItens: document.getElementById('itens'),
        total: document.getElementById('total'),
        count: document.getElementById('cart-count'),
        form: document.getElementById('form-checkout'),
        btnCheckout: document.getElementById('btn-checkout')
    };

   
    if (el.busca) {
        el.busca.addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            document.querySelectorAll('.produto').forEach(produto => {
                const nome = produto.getAttribute('data-nome').toLowerCase();
                produto.classList.toggle('hidden', !nome.includes(termo));
            });
        });
    }

   
    const moeda = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    
    const salvar = () => localStorage.setItem('petcare-cart', JSON.stringify(state.cart));
    
    const carregar = () => {
        const raw = localStorage.getItem('petcare-cart');
        try {
            state.cart = raw ? JSON.parse(raw) : [];
        } catch (e) {
            state.cart = [];
        }
        renderCarrinho();
    };

   
    function renderCarrinho() {
        if (!el.listaItens) return;

        el.listaItens.innerHTML = state.cart.length === 0 
            ? '<div style="color:#666; font-size:13px; margin-top:10px;">Vazio...</div>' 
            : '';
        
        state.cart.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <span>${item.nome}</span>
                <div class="qty">
                    <button type="button" onclick="alterarQtd(${item.id}, -1)">-</button>
                    <span>${item.qty}</span>
                    <button type="button" onclick="alterarQtd(${item.id}, 1)">+</button>
                </div>
                <span>${moeda(item.preco * item.qty)}</span>
            `;
            el.listaItens.appendChild(div);
        });

        const totalValue = state.cart.reduce((s, i) => s + (i.preco * i.qty), 0);
        const totalItems = state.cart.reduce((s, i) => s + i.qty, 0);

        el.total.textContent = moeda(totalValue);
        el.count.textContent = totalItems;
    }

    window.alterarQtd = function(id, delta) {
        const item = state.cart.find(i => i.id === id);
        if (item) {
            item.qty += delta;
            if (item.qty <= 0) {
                state.cart = state.cart.filter(i => i.id !== id);
            }
        }
        salvar(); 
        renderCarrinho();
    };

    document.addEventListener('click', e => {
        if (e.target.classList.contains('add-to-cart')) {
            const btn = e.target;
            const id = parseInt(btn.dataset.id);
            const itemExistente = state.cart.find(i => i.id === id);

            if (itemExistente) {
                itemExistente.qty++;
            } else {
                state.cart.push({ 
                    id, 
                    nome: btn.dataset.name, 
                    preco: parseFloat(btn.dataset.price), 
                    qty: 1 
                });
            }
            salvar(); 
            renderCarrinho();
        }
    });


    el.btnCheckout?.addEventListener('click', () => {
        if (state.cart.length === 0) return alert("Seu carrinho está vazio!");
        el.form.style.display = el.form.style.display === 'block' ? 'none' : 'block';
    });

   
    el.form?.addEventListener('submit', (e) => {
        e.preventDefault(); 
        
        alert("Pedido realizado com sucesso!");
   
        state.cart = [];
        salvar();
        renderCarrinho();
        el.form.style.display = 'none';
        el.form.reset();
    });

    carregar();

    function irConfig(){
        window.location.href = "config.html";
    }
</script>
