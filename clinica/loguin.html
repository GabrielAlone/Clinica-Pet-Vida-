<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Vida - Login</title>
<style>
   
    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }

   
    body { 
     
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        padding: 20px;

       
        background-color: #f0f2f5; 
        background-image: url('image.png'); 
        background-position: center;
        background-size: cover; 
        background-repeat: no-repeat;
        background-attachment: fixed; 
    }

   
    .login-box { 
        background: rgba(255, 255, 255, 0.95);
        padding: 40px; 
        border-radius: 15px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        width: 100%; 
        max-width: 400px; 
        text-align: center; 
        backdrop-filter: blur(5px); 
    }

    h2 { 
        color: #333; 
        margin-bottom: 25px; 
        font-size: 24px;
    }

    .input-group { 
        text-align: left; 
        margin-bottom: 15px; 
    }

    label { 
        display: block; 
        font-weight: 600; 
        color: #555; 
        margin-bottom: 5px; 
        font-size: 14px; 
    }


    input[type="text"], 
    input[type="password"],
    input[type="email"] { 
        width: 100%; 
        padding: 12px; 
        border: 1px solid #ddd; 
        border-radius: 8px; 
        font-size: 16px; 
        transition: border-color 0.3s, box-shadow 0.3s;
    }

    input:focus {
        outline: none;
        border-color: #2c7be5;
        box-shadow: 0 0 0 3px rgba(44, 123, 229, 0.1);
    }

   
    .remember { 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        margin: 15px 0; 
        font-size: 14px; 
        color: #666; 
        cursor: pointer; 
    }

    .back-link { 
        display: block; 
        margin-top: 20px; 
        color: #2c7be5; 
        text-decoration: none; 
        font-size: 14px; 
        font-weight: 500;
    }

    .back-link:hover {
        text-decoration: underline;
    }

  
    button { 
        width: 100%; 
        padding: 13px; 
        background: #2c7be5; 
        color: white; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold; 
        font-size: 16px; 
        transition: background 0.3s, transform 0.1s; 
    }

    button:hover { 
        background: #1a5fc4; 
    }

    button:active {
        transform: scale(0.98);
    }
</style>
</head>
<body>
    <div class="login-box">
        <img src="unnamed.webp" alt="Logo" width="80" height="80" onerror="this.src='hcn-icons-png.flaticon.com/512/620/620851.png'">
        <h2>Login</h2>
        <div class="input-group">
            <label>nome</label>
            <input type="text" placeholder="Digite seu e-mail">
        </div>
        <div class="input-group">
            <label>e-mail</label>
            <input type="password" placeholder="Digite sua senha">
        </div>
        <label class="remember">
            <input type="checkbox"> Lembrar de mim
        </label>
        <button onclick="window.location.href='index.html'">Entrar</button>
        <a href="cadastro.html" class="back-link">Voltar para Cadastro</a>
    </div>
</body>
</html>
